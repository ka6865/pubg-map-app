name: Daily BGMS Maintenance

on:
  schedule:
    # 매일 한국 시간 새벽 3시 (UTC 18:00) 실행
    - cron: '0 18 * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Board Write Quota Cleanup
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cleanup_board_write_rate_limits.ts

      - name: Check Storage Before Maintenance
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
        run: npx tsx scripts/monitor_storage.ts --label "BEFORE"

      - name: Run Storage Cleanup
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLEANUP_TARGET_VERSION: ${{ secrets.CLEANUP_TARGET_VERSION }}
          CLEANUP_RETENTION_DAYS: ${{ secrets.CLEANUP_RETENTION_DAYS || 5 }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
        run: npx tsx scripts/cleanup_telemetry.ts

      - name: Run AI Cache Cleanup
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cleanup_ai_cache.ts

      - name: Audit PUBG Analysis Data Quality
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/audit_processed_telemetry_identity.ts --recent-days 2 --max-rows 1000 --target-limit 50

      - name: Run Smart Scraper
        env:
          PUBG_API_KEY: ${{ secrets.PUBG_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          ELITE_PLAYER_LIMIT: 5 # 인원 절반 축소
          ELITE_MATCH_LIMIT: 3  # 매치 수 축소
          ENABLE_SAMPLING: false # 샘플링 비활성화로 부하 최소화
        run: npx tsx scripts/scrape_elite.ts

      - name: Extract Bluezone Statistics
        env:
          PUBG_API_KEY: ${{ secrets.PUBG_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/extract_bluezone.ts

      - name: Sync Patch Notes
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ADMIN_SECRET_TOKEN: ${{ secrets.ADMIN_SECRET_TOKEN }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: npx tsx scripts/sync_patch_notes.ts

      - name: Check Storage After Maintenance
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
        run: npx tsx scripts/monitor_storage.ts --label "AFTER"

      - name: Record Agent Monitor Snapshot
        if: always()
        env:
          APP_URL: ${{ secrets.APP_URL }}
          ADMIN_AGENT_CRON_SECRET: ${{ secrets.ADMIN_AGENT_CRON_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          SECRET="${ADMIN_AGENT_CRON_SECRET:-$CRON_SECRET}"
          if [ -z "$APP_URL" ] || [ -z "$SECRET" ]; then
            echo "APP_URL or agent cron secret is missing; skipping agent monitor snapshot."
            exit 0
          fi
          curl -fsS "$APP_URL/api/admin/agent/monitor" \
            -H "Authorization: Bearer $SECRET"

      - name: Record Agent Rollout Readiness Snapshot
        if: always()
        env:
          APP_URL: ${{ secrets.APP_URL }}
          ADMIN_AGENT_CRON_SECRET: ${{ secrets.ADMIN_AGENT_CRON_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          SECRET="${ADMIN_AGENT_CRON_SECRET:-$CRON_SECRET}"
          if [ -z "$APP_URL" ] || [ -z "$SECRET" ]; then
            echo "APP_URL or agent cron secret is missing; skipping agent rollout readiness snapshot."
            exit 0
          fi
          curl -fsS "$APP_URL/api/admin/agent/rollout" \
            -H "Authorization: Bearer $SECRET"

      - name: Run Hotdrop Collection
        env:
          PUBG_API_KEY: ${{ secrets.PUBG_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/run_hotdrop.ts
