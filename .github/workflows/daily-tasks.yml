name: Daily BGMS Maintenance

on:
  schedule:
    # 매일 한국 시간 새벽 3시 (UTC 18:00) 실행
    - cron: '0 18 * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Storage Cleanup
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLEANUP_TARGET_VERSION: ${{ secrets.CLEANUP_TARGET_VERSION }}
          CLEANUP_RETENTION_DAYS: 1 # 자동화 시에는 더 짧게 유지하여 용량 확보
        run: npx tsx scripts/cleanup_telemetry.ts

      - name: Run Smart Scraper
        env:
          PUBG_API_KEY: ${{ secrets.PUBG_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          ELITE_PLAYER_LIMIT: 5 # 인원 절반 축소
          ELITE_MATCH_LIMIT: 3  # 매치 수 축소
          ENABLE_SAMPLING: false # 샘플링 비활성화로 부하 최소화
        run: npx tsx scripts/scrape_elite.ts

      - name: Extract Bluezone Statistics
        env:
          PUBG_API_KEY: ${{ secrets.PUBG_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/extract_bluezone.ts

      - name: Sync Patch Notes
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ADMIN_SECRET_TOKEN: ${{ secrets.ADMIN_SECRET_TOKEN }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: npx tsx scripts/sync_patch_notes.ts
